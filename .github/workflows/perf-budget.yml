name: Performance budget

# F18: fail the build if client JS/CSS exceeds the 3G budget.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: node scripts/perf-budget.mjs
