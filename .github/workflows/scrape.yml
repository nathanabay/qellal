name: Scrape tenders

# Pulls new tender notices into the review queue (pending_review). Runs every
# 6 hours; manual runs default to a dry run so you can preview safely.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape"
        default: "2merkato"
      pages:
        description: "Listing pages to fetch (15 tenders each)"
        default: "3"
      dry_run:
        description: "Dry run (1 = extract only, do not write)"
        default: "1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install scraper deps
        working-directory: scrapers
        run: npm install --no-audit --no-fund
      - name: Run scraper
        working-directory: scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 2merkato subscriber login — unlocks hidden closing dates.
          MERKATO_USERNAME: ${{ secrets.MERKATO_USERNAME }}
          MERKATO_PASSWORD: ${{ secrets.MERKATO_PASSWORD }}
          # Scheduled runs write for real; manual runs honor the dry_run input.
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: npm run scrape -- ${{ github.event.inputs.source || '2merkato' }} ${{ github.event.inputs.pages || '3' }}
