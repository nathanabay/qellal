name: Scrape tenders

# Scrapes all currently-open 2merkato tenders (auto-stops when open tenders run
# out, ~150-300 pages) and auto-publishes them. Runs once daily; manual runs
# default to a dry run so you can preview safely.
on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC = 07:00 EAT, before the notify job
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape"
        default: "2merkato"
      pages:
        description: "Listing pages to crawl this run"
        default: "500"
      start_page:
        description: "Resume deep backfill from this list page"
        default: "1"
      dry_run:
        description: "Dry run (1 = extract only, do not write)"
        default: "1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Secrets live in the "Production" environment, so the job must declare it.
    environment: Production
    # Long enough for a deep backfill chunk; progress is flushed incrementally,
    # so even if it's cut off, everything scraped so far is saved.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install scraper deps
        working-directory: scrapers
        run: npm install --no-audit --no-fund
      - name: Run scraper
        working-directory: scrapers
        env:
          # Reuse the existing NEXT_PUBLIC_SUPABASE_URL secret for the scraper.
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 2merkato subscriber login — unlocks hidden closing dates.
          MERKATO_USERNAME: ${{ secrets.MERKATO_USERNAME }}
          MERKATO_PASSWORD: ${{ secrets.MERKATO_PASSWORD }}
          # Resume point for chunked deep backfill (default 1).
          START_PAGE: ${{ github.event.inputs.start_page || '1' }}
          # Scheduled runs write for real; manual runs honor the dry_run input.
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          # Meilisearch — the scraper pushes new tenders to the index as it writes.
          MEILI_HOST: ${{ secrets.MEILI_HOST }}
          MEILI_ADMIN_KEY: ${{ secrets.MEILI_ADMIN_KEY }}
          # Pass user inputs through env (NOT interpolated into the shell command)
          # so a crafted `source`/`pages` value can't inject shell into a job that
          # holds the service-role key.
          SOURCE: ${{ github.event.inputs.source || '2merkato' }}
          PAGES: ${{ github.event.inputs.pages || '500' }}
        run: npm run scrape -- "$SOURCE" "$PAGES"
      - name: Reindex search (reconcile after scrape)
        if: ${{ github.event.inputs.dry_run != '1' }}
        working-directory: scrapers
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MEILI_HOST: ${{ secrets.MEILI_HOST }}
          MEILI_ADMIN_KEY: ${{ secrets.MEILI_ADMIN_KEY }}
        run: npm run reindex
